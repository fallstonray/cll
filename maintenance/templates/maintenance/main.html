<script>
// .nav-hover-label items:
//   Desktop (≥992 px) — hover opens the dropdown; clicking the label navigates.
//   Mobile            — tapping toggles the dropdown normally (Bootstrap default).
(function () {
  document.querySelectorAll('.nav-hover-label').forEach(function (toggle) {
    var bsDropdown = bootstrap.Dropdown.getOrCreateInstance(toggle);
    var navItem    = toggle.closest('.nav-item');

    // Show on hover (desktop only)
    navItem.addEventListener('mouseenter', function () {
      if (window.innerWidth >= 992) bsDropdown.show();
    });

    // Hide when mouse leaves the whole nav item (including the open menu)
    navItem.addEventListener('mouseleave', function () {
      if (window.innerWidth >= 992) bsDropdown.hide();
    });

    // Click navigates on desktop; on mobile let Bootstrap toggle the dropdown
    toggle.addEventListener('click', function (e) {
      if (window.innerWidth >= 992) {
        e.preventDefault();
        e.stopImmediatePropagation();
        window.location.href = toggle.getAttribute('href');
      }
    }, true); // capture phase — fires before Bootstrap's click handler
  });
}());
</script>

</body>
