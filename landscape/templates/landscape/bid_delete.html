{% extends 'maintenance/main.html' %}
{% block content %}
<br>
<div class="row">
    <div class="col-md-6">
        <div class="card card-body">
            <p>Are you sure you want to delete <strong>"{{item}}"</strong>?</p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <input class="btn btn-danger" type="submit" value="Confirm Delete">
                    <a class="btn btn-warning" href="{% url 'bid_pipeline' %}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<br>
{% endblock %}
